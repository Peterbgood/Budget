<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Knoxville Budget Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
</head>
<body class="bg-gray-50 font-sans">
  <div class="container mx-auto px-4 py-6 max-w-4xl">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Knoxville Budget</h1>
            <p id="lastSync" class="text-xs text-slate-500 font-medium uppercase tracking-widest mt-1">Initializing...</p>
        </div>
        <button id="syncBtn" onclick="syncWithSheet()" class="w-full sm:w-auto bg-slate-900 hover:bg-slate-800 text-white px-6 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg active:scale-95">
            <span id="btnText">Sync from Google Sheets</span>
        </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <p class="text-xs font-bold text-slate-400 uppercase mb-1">Monthly Net (After Tax)</p>
          <p class="text-3xl font-black text-emerald-600" id="monthlyNet">$0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <p class="text-xs font-bold text-slate-400 uppercase mb-1">Monthly Expenses</p>
          <p class="text-3xl font-black text-rose-500" id="totalBills">$0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <p class="text-xs font-bold text-slate-400 uppercase mb-1">Monthly Surplus</p>
          <p class="text-3xl font-black text-indigo-600" id="surplus">$0</p>
      </div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-8">
        <div style="height: 300px;"><canvas id="budgetChart"></canvas></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <section>
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">💰 Income</h2>
            <div id="incomeList" class="space-y-3"></div>
        </section>
        <section>
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">📉 Expenses</h2>
            <div id="expenseList" class="grid grid-cols-1 gap-3"></div>
        </section>
    </div>
  </div>

  <script>
    Chart.register(ChartDataLabels);
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDoP-8zjTmyIzsFei7-icriWqs5OGQSf-9YxPnUNpftY9SRmsoUcaVmugOrEFcyoPpNKnIMu9_5mAU/pub?output=csv';
    
    let budgetData = { income: [], expenses: [] };
    let chart;

    function initChart() {
      const ctx = document.getElementById('budgetChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'bar',
        data: { 
            labels: ['Net Income', 'Expenses', 'Surplus'], 
            datasets: [{ data: [0, 0, 0], backgroundColor: ['#059669', '#e11d48', '#4f46e5'], borderRadius: 12 }] 
        },
        options: { 
            responsive: true, maintainAspectRatio: false, 
            plugins: { legend: { display: false }, datalabels: { anchor: 'end', align: 'top', formatter: (v) => `$${Math.round(v).toLocaleString()}`, font: { weight: 'bold' } } },
            scales: { y: { display: false, beginAtZero: true } }
        }
      });
    }

    async function syncWithSheet() {
      const btnText = document.getElementById('btnText');
      btnText.innerText = 'Updating...';
      
      try {
        const response = await fetch(`${sheetUrl}&cachebust=${Date.now()}`);
        const csvText = await response.text();
        const rows = csvText.split(/\r?\n/).slice(1); // Skip header row

        budgetData = { income: [], expenses: [] };

        rows.forEach(row => {
            const cols = row.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
            if (cols.length >= 2) {
                const label = cols[0].replace(/"/g, '').trim();
                const value = parseFloat(cols[1].replace(/[$,"]/g, '').trim()) || 0;
                
                if (label.toLowerCase().includes('income')) {
                    budgetData.income.push({ label, value });
                } else {
                    budgetData.expenses.push({ label, value });
                }
            }
        });

        renderLists();
        updateDisplay();
        document.getElementById('lastSync').innerText = `Last Updated: ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        console.error(e);
      } finally {
        btnText.innerText = 'Sync from Google Sheets';
      }
    }

    function renderLists() {
        const incDiv = document.getElementById('incomeList');
        const expDiv = document.getElementById('expenseList');
        
        incDiv.innerHTML = budgetData.income.map(item => createRow(item, 'income')).join('');
        expDiv.innerHTML = budgetData.expenses.map(item => createRow(item, 'expense')).join('');
    }

    function createRow(item, type) {
        return `
            <div class="flex justify-between items-center bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                <span class="text-sm font-bold text-slate-600">${item.label}</span>
                <span class="font-mono font-bold ${type === 'income' ? 'text-emerald-600' : 'text-slate-900'}">$${item.value.toLocaleString()}</span>
            </div>
        `;
    }

    function updateDisplay() {
      const taxRate = 0.7253;
      const totalGrossIncome = budgetData.income.reduce((sum, item) => sum + item.value, 0);
      const monthlyNet = (totalGrossIncome * taxRate) / 12;
      const totalExpenses = budgetData.expenses.reduce((sum, item) => sum + item.value, 0);
      const surplus = monthlyNet - totalExpenses;

      document.getElementById('monthlyNet').innerText = `$${Math.round(monthlyNet).toLocaleString()}`;
      document.getElementById('totalBills').innerText = `$${Math.round(totalExpenses).toLocaleString()}`;
      document.getElementById('surplus').innerText = `$${Math.round(surplus).toLocaleString()}`;

      chart.data.datasets[0].data = [monthlyNet, totalExpenses, surplus];
      chart.update();
    }

    initChart();
    syncWithSheet();
  </script>
</body>
</html>
